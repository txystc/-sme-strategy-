name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            openjdk-17-jdk-headless \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libswscale-dev libffi-dev libssl-dev cmake git zip unzip wget python3-pip

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROIDSDK=$ANDROID_HOME
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653
          mkdir -p $ANDROID_HOME
          echo "SDK path: $ANDROID_HOME"
          ls $ANDROID_HOME/
          echo "--- Installing SDK components ---"
          if [ -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
            $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
              "platforms;android-28" \
              "build-tools;34.0.0" \
              "platform-tools" \
              "ndk;25.2.9519653" || echo "SDK install had issues"
          else
            echo "ERROR: sdkmanager not found at expected path"
            ls -la $ANDROID_HOME/cmdline-tools/ 2>/dev/null || true
            ls -la $ANDROID_HOME/ 2>/dev/null || true
          fi
          echo "--- SDK contents after install ---"
          ls $ANDROID_HOME/

      - name: Install buildozer + python-for-android
        run: |
          pip3 install --upgrade pip setuptools wheel
          pip3 install buildozer python-for-android

      - name: Build debug APK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROIDSDK=$ANDROID_HOME
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653
          export ANDROID_API=28
          export ANDROID_NDK_API=28
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          echo "=== Environment ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROIDSDK=$ANDROIDSDK"
          ls $ANDROID_HOME/ 2>/dev/null
          echo "=== Checking buildozer ==="
          which buildozer || echo "buildozer not in PATH"
          buildozer --version 2>&1 || true
          echo "=== Running buildozer android debug ==="
          buildozer android debug 2>&1 || {
            EXIT=$?
            echo "=== buildozer exit code: $EXIT ==="
            find . -name "*.apk" -type f 2>/dev/null && echo "APK found" || echo "No APK found"
            ls -la bin/ build/ 2>/dev/null || echo "bin/build not found"
            exit $EXIT
          }
          echo "=== APK ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK"
        timeout-minutes: 90

      - name: Upload APK
        if: success()
        run: |
          APK=$(find . -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found"
            exit 1
          fi
          cp "$APK" sme-strategy.apk
          TAG="v$(date +%Y%m%d-%H%M%S)"
          RESPONSE=$(curl -sL \
            -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/${{ github.repository }}/releases \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"SME策略 App $TAG\",\"draft\":false}")
          echo "Release: $RESPONSE"
          UPLOAD_URL=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('upload_url','').replace('{?name,label}',''))" 2>/dev/null)
          if [ -n "$UPLOAD_URL" ]; then
            curl -sL -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@sme-strategy.apk" \
              "$UPLOAD_URL?name=sme-strategy.apk"
          fi
