name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with buildozer Docker
        run: |
          echo "=== Build Start ==="
          docker run --rm -v "$PWD:/app" -w /app ghcr.io/kivy/buildozer:latest buildozer android debug 2>&1 || true
          echo "=== Build End ==="
          echo "=== Check bin/ ==="
          ls -la bin/ 2>/dev/null || echo "No bin/"
          echo "=== Check APK ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sme-strategy-apk
          path: bin/*.apk
          retention-days: 1
