name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            openjdk-17-jdk-headless \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libswscale-dev libffi-dev libssl-dev cmake git zip

      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-kivy-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-pip-kivy-

      - name: Install buildozer
        run: pip3 install --upgrade pip buildozer

      - name: Build debug APK
        run: |
          buildozer android debug 2>&1 | tail -50
          echo "=== Locating APK ==="
          APK_PATH=$(find . -name "*.apk" -type f | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "Found APK: $APK_PATH"
            cp "$APK_PATH" ./sme-strategy.apk
            ls -lh ./sme-strategy.apk
          else
            echo "ERROR: No APK found!"
            ls -la bin/ build/ 2>/dev/null
          fi
        timeout-minutes: 90

      - name: Upload to GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: SME策略 App v${{ github.run_number }}
          files: ./sme-strategy.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
