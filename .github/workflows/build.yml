name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with buildozer Docker
        run: |
          docker run --rm -v "$PWD:/app" -w /app ghcr.io/kivy/buildozer:latest buildozer android debug > buildozer_output.txt 2>&1
          echo "=== Exit code: $? ==="
          echo "=== APK check ==="
          find . -name "*.apk" -type f -exec ls -lh {} \;

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer_output.txt
          retention-days: 3

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sme-strategy-apk
          path: bin/*.apk
          retention-days: 1
          if-no-files-found: error
