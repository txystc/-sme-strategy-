name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            openjdk-17-jdk-headless \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libswscale-dev libffi-dev libssl-dev \
            cmake git zip unzip wget python3-pip \
            python3-dev python3-venv

      - name: Download Android SDK
        run: |
          mkdir -p android-sdk
          cd android-sdk
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          ls -la cmdline-tools/latest/bin/

      - name: Install Android SDK components
        run: |
          export ANDROID_HOME=$PWD/android-sdk
          export ANDROIDSDK=$ANDROID_HOME
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager \
            "platforms;android-28" \
            "build-tools;34.0.0" \
            "platform-tools" \
            "ndk;25.2.9519653"

      - name: Install buildozer and python-for-android
        run: |
          export HOME=/root
          set -x
          pip3 install --upgrade pip setuptools wheel 2>&1 | tee step7_output.txt; echo "PIP_UPGRADE_EXIT=$?" >> step7_output.txt
          pip3 install buildozer python-for-android 2>&1 | tee -a step7_output.txt; echo "PIP_INSTALL_EXIT=$?" >> step7_output.txt
          python3 -m buildozer --version 2>&1 | tee -a step7_output.txt; echo "BUILDOZER_CHECK_EXIT=$?" >> step7_output.txt || true
          pip3 show python-for-android 2>&1 | tee -a step7_output.txt; echo "P4A_SHOW_EXIT=$?" >> step7_output.txt || true
          pip3 show buildozer 2>&1 | tee -a step7_output.txt; echo "BZR_SHOW_EXIT=$?" >> step7_output.txt || true
          echo "=== STEP7 COMPLETE ===" >> step7_output.txt

      - name: Build debug APK
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
          ANDROIDSDK: ${{ github.workspace }}/android-sdk
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          PATH: ${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:${{ github.workspace }}/android-sdk/platform-tools:${{ github.workspace }}/android-sdk/build-tools/34.0.0:/usr/local/bin:/usr/bin:/bin
        run: |
          set -x
          echo "=== DIAGNOSTIC ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROIDSDK=$ANDROIDSDK"
          echo "JAVA_HOME=$JAVA_HOME"
          echo "PATH=$PATH"
          echo "pwd=$(pwd)"
          echo "python=$(which python3)"
          echo "java=$(which java 2>/dev/null || echo 'not found')"
          java -version 2>&1 || echo "JAVA_NOT_FOUND"
          echo "=== SDK ==="
          ls -la "$ANDROID_HOME/"
          echo "=== NDK ==="
          ls "$ANDROID_HOME/ndk/" 2>/dev/null || echo "(no NDK)"
          echo "=== build-tools ==="
          ls "$ANDROID_HOME/build-tools/" 2>/dev/null || echo "(no build-tools)"
          echo "=== buildozer version ==="
          python3 -m buildozer --version 2>&1 || echo "FAILED"
          echo "=== project files ==="
          ls -la
          echo "=== buildozer.spec ==="
          cat buildozer.spec 2>/dev/null || echo "(no spec)"
          echo "=== main.py first 10 lines ==="
          head -10 main.py 2>/dev/null || echo "(no main.py)"
          echo "=== STEP8 OUTPUT START ===" 
          python3 -m buildozer android debug > buildozer_output.txt 2>&1
          BUILD_EXIT=$?
          echo "=== STEP8 OUTPUT END, EXIT=$BUILD_EXIT ===" >> buildozer_output.txt
          echo "=== buildozer EXIT CODE: $BUILD_EXIT ==="
          echo "=== buildozer_output first 30 lines ==="
          head -30 buildozer_output.txt || echo "(empty or missing)"
          echo "=== workspace ==="
          ls -la
          echo "=== bin/ ==="
          ls -la bin/ 2>/dev/null || echo "(no bin)"
          echo "=== find APK ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "no apk"
          echo "=== .buildozer ==="
          ls -la .buildozer/ 2>/dev/null || echo "(no .buildozer)"
          echo "=== buildozer_output last 50 ==="
          tail -50 buildozer_output.txt 2>/dev/null || echo "(no output)"
          if [ "$BUILD_EXIT" != "0" ]; then
            echo "BUILD FAILED exit=$BUILD_EXIT"
            exit 1
          fi
          echo "BUILD SUCCESS"
        timeout-minutes: 90

      - name: Upload APK
        if: success()
        run: |
          echo "=== Search for APK ==="
          APK=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          echo "APK=$APK"
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found"
            exit 1
          fi
          cp "$APK" sme-strategy.apk
          TAG="v$(date +%Y%m%d-%H%M%S)"
          echo "=== Create release $TAG ==="
          RESP=$(curl -sL -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/${{ github.repository }}/releases \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"SME $TAG\",\"draft\":false}")
          echo "Release: $RESP"
          UPLOAD_URL=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('upload_url','').replace('{?name,label}',''))" 2>/dev/null)
          if [ -n "$UPLOAD_URL" ]; then
            curl -sL -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@sme-strategy.apk" \
              "$UPLOAD_URL?name=sme-strategy.apk"
            echo "Upload done"
          fi

      - name: Upload failure log
        if: failure()
        run: |
          echo "=== step7_output.txt (Step 7 install log) ==="
          cat step7_output.txt 2>/dev/null || echo "(no step7_output.txt)"
          echo "=== buildozer_output.txt (Step 8 full output) ==="
          cat buildozer_output.txt 2>/dev/null || echo "(no buildozer_output.txt)"
