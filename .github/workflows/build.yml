name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            openjdk-17-jdk-headless \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libswscale-dev libffi-dev libssl-dev cmake git zip unzip wget python3-pip

      - name: Download Android SDK
        run: |
          mkdir -p android-sdk
          cd android-sdk
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          ls -la cmdline-tools/latest/bin/

      - name: Install Android SDK components
        run: |
          export ANDROID_HOME=$PWD/android-sdk
          export ANDROIDSDK=$ANDROID_HOME
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager \
            "platforms;android-28" \
            "build-tools;34.0.0" \
            "platform-tools" \
            "ndk;25.2.9519653"

      - name: Install buildozer + python-for-android
        run: |
          pip3 install --upgrade pip setuptools wheel
          pip3 install buildozer python-for-android

      - name: Build debug APK
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
          ANDROIDSDK: ${{ github.workspace }}/android-sdk
          PATH: ${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:${{ github.workspace }}/android-sdk/platform-tools:${{ github.workspace }}/android-sdk/build-tools/34.0.0:${{ runner.os == 'Windows' && 'C:/ProgramData/chocolatey/bin' || '/usr/local/bin:/usr/bin:/bin' }}
        run: |
          echo "=== ENV CHECK ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROIDSDK=$ANDROIDSDK"
          echo "PATH=$PATH"
          echo "ls ANDROID_HOME:"
          ls "$ANDROID_HOME/"
          echo "ls platforms:"
          ls "$ANDROID_HOME/platforms/" || echo "(no platforms)"
          echo "ls build-tools:"
          ls "$ANDROID_HOME/build-tools/" || echo "(no build-tools)"
          echo "ls NDK:"
          ls "$ANDROID_HOME/ndk/" || echo "(no NDK)"
          echo "which python3:"
          which python3
          echo "buildozer version:"
          python3 -m buildozer --version || echo "buildozer module check FAILED"
          echo "=== STARTING BUILD ==="
          python3 -m buildozer android debug && BUILD_EXIT=0 || BUILD_EXIT=$?
          echo "=== buildozer EXIT CODE: $BUILD_EXIT ==="
          echo "=== list workspace ==="
          ls -la
          echo "=== list .buildozer dir ==="
          ls -la .buildozer/ 2>/dev/null || echo "no .buildozer"
          echo "=== list bin dir ==="
          ls -la bin/ 2>/dev/null || echo "no bin"
          echo "=== find APK ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "no apk found"
          echo "=== find in home ==="
          find /home -name "*.apk" -type f 2>/dev/null | head -5 || echo "no apk in /home"
          # Only exit with build error, not diagnostic error
          if [ "$BUILD_EXIT" != "0" ]; then
            echo "BUILD FAILED with exit $BUILD_EXIT"
            exit 1
          fi
        timeout-minutes: 90

      - name: Upload APK
        if: success()
        run: |
          echo "=== Search for APK ==="
          APK=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          echo "APK=$APK"
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found"
            exit 1
          fi
          echo "Found: $APK"
          cp "$APK" sme-strategy.apk
          TAG="v$(date +%Y%m%d-%H%M%S)"
          echo "=== Create release $TAG ==="
          RESP=$(curl -sL -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/${{ github.repository }}/releases \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"SME策略 $TAG\",\"draft\":false}")
          echo "Release response: $RESP"
          UPLOAD_URL=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('upload_url','').replace('{?name,label}',''))" 2>/dev/null)
          if [ -n "$UPLOAD_URL" ]; then
            curl -sL -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@sme-strategy.apk" \
              "$UPLOAD_URL?name=sme-strategy.apk"
            echo "Upload done"
          else
            echo "ERROR: No release URL"
            exit 1
          fi
