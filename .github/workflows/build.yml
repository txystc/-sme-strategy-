name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-dev openjdk-17-jdk-headless autoconf libtool pkg-config zlib1g-dev libncurses5-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libswscale-dev libffi-dev libssl-dev cmake git

      - name: Set JAVA_HOME
        run: echo 'JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64' >> 

      - name: Install Python dependencies
        run: pip3 install --upgrade pip buildozer

      - name: Build debug APK
        run: buildozer android debug --verbose
        timeout-minutes: 60

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sme-strategy-apk
          path: bin/*.apk
