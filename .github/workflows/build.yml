name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            openjdk-17-jdk-headless \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libswscale-dev libffi-dev libssl-dev cmake git zip unzip wget python3-pip

      - name: Download Android SDK
        run: |
          mkdir -p android-sdk
          cd android-sdk
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          ls -la cmdline-tools/latest/bin/ || ls -la cmdline-tools/

      - name: Install Android SDK components
        run: |
          export ANDROID_HOME=$PWD/android-sdk
          export ANDROIDSDK=$ANDROID_HOME
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          echo "ANDROID_HOME=$ANDROID_HOME"
          yes | sdkmanager --licenses 2>/dev/null || true
          echo "=== Installing components ==="
          sdkmanager \
            "platforms;android-28" \
            "build-tools;34.0.0" \
            "platform-tools" \
            "ndk;25.2.9519653"
          echo "=== Installed ==="
          sdkmanager --list_installed

      - name: Install buildozer + python-for-android
        run: |
          pip3 install --upgrade pip setuptools wheel
          pip3 install buildozer python-for-android
          pip3 list | grep -E "buildozer|python-for"

      - name: Build debug APK
        run: |
          echo "=== ENV ==="
          echo "ANDROID_HOME=${{ github.workspace }}/android-sdk"
          ls ${{ github.workspace }}/android-sdk/
          echo "=== which python3 ==="
          which python3 || echo "python3 not found"
          echo "=== buildozer via module ==="
          python3 -m buildozer --version 2>&1 || echo "FAIL: buildozer module failed"
          echo "=== cd to workspace ==="
          cd ${{ github.workspace }}
          pwd
          echo "=== list workspace before build ==="
          ls -la
          echo "=== buildozer android debug ==="
          python3 -m buildozer android debug
          echo "=== buildozer exit code: $? ==="
          echo "=== list workspace after build ==="
          ls -la
          echo "=== list .buildozer dir ==="
          ls -la .buildozer/ 2>/dev/null || echo "no .buildozer dir"
          echo "=== list bin dir ==="
          ls -la bin/ 2>/dev/null || echo "no bin dir"
          ls -la bin/debug/ 2>/dev/null || echo "no bin/debug dir"
          echo "=== find APK anywhere ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "no apk found"
          echo "=== find APK in /tmp ==="
          find /tmp -name "*.apk" -type f 2>/dev/null | head -5
        timeout-minutes: 90

      - name: Upload APK
        if: success()
        run: |
          echo "=== Searching for APK ==="
          APK=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          echo "APK=$APK"
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found, listing all files"
            find . -type f 2>/dev/null | head -20
            exit 1
          fi
          echo "Found APK: $APK"
          cp "$APK" sme-strategy.apk
          ls -la sme-strategy.apk
          TAG="v$(date +%Y%m%d-%H%M%S)"
          RESPONSE=$(curl -sL \
            -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/${{ github.repository }}/releases \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"SME策略 App $TAG\",\"draft\":false}")
          echo "Release response: $RESPONSE"
          UPLOAD_URL=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('upload_url','').replace('{?name,label}',''))" 2>/dev/null)
          if [ -n "$UPLOAD_URL" ]; then
            curl -sL -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@sme-strategy.apk" \
              "$UPLOAD_URL?name=sme-strategy.apk"
            echo "Upload complete"
          else
            echo "ERROR: Could not create release"
            echo "$RESPONSE"
            exit 1
          fi
