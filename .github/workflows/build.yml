name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            openjdk-17-jdk-headless \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libswscale-dev libffi-dev libssl-dev cmake git zip unzip

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install buildozer + python-for-android
        run: |
          pip3 install --upgrade pip
          pip3 install buildozer python-for-android

      - name: Build debug APK
        run: |
          buildozer android debug 2>&1
          EXIT=$?
          echo "=== buildozer exit code: $EXIT ==="
          APK=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "APK found: $APK"
            cp "$APK" sme-strategy.apk
          else
            echo "ERROR: No APK found"
            ls -la bin/ build/ 2>/dev/null || true
          fi
          exit $EXIT
        timeout-minutes: 90

      - name: Create Release
        if: success()
        run: |
          TAG="v$(date +%Y%m%d-%H%M%S)"
          echo "Creating release: $TAG"
          RESPONSE=$(curl -sL \
            -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/${{ github.repository }}/releases \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"SME策略 App $TAG\",\"draft\":false}")
          echo "Release response: $RESPONSE"
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV

      - name: Upload APK to Release
        if: success()
        run: |
          APK=$(find . -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK to upload"
            exit 1
          fi
          cp "$APK" sme-strategy.apk
          RELEASE=$(curl -sL \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest")
          UPLOAD_URL=$(echo "$RELEASE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['upload_url'].replace('{?name,label}',''))")
          echo "Uploading to: $UPLOAD_URL"
          curl -sL \
            -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@sme-strategy.apk" \
            "$UPLOAD_URL?name=sme-strategy.apk"
          echo "=== Done! ==="
