name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            openjdk-17-jdk-headless \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libswscale-dev libffi-dev libssl-dev cmake git zip unzip wget python3-pip

      - name: Download Android SDK
        run: |
          mkdir -p android-sdk
          cd android-sdk
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          ls -la cmdline-tools/latest/bin/ || ls -la cmdline-tools/

      - name: Install Android SDK components
        run: |
          export ANDROID_HOME=$PWD/android-sdk
          export ANDROIDSDK=$ANDROID_HOME
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          echo "ANDROID_HOME=$ANDROID_HOME"
          yes | sdkmanager --licenses 2>/dev/null || true
          echo "=== Installing components ==="
          sdkmanager \
            "platforms;android-28" \
            "build-tools;34.0.0" \
            "platform-tools" \
            "ndk;25.2.9519653" || echo "Some components failed"
          echo "=== Installed components ==="
          sdkmanager --list_installed

      - name: Install buildozer + python-for-android
        run: |
          pip3 install --upgrade pip setuptools wheel
          pip3 install buildozer python-for-android
          echo "=== pip packages ==="
          pip3 list | grep -E "buildozer|python-for"

      - name: Build debug APK
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
          ANDROIDSDK: ${{ github.workspace }}/android-sdk
          ANDROID_NDK_HOME: ${{ github.workspace }}/android-sdk/ndk/25.2.9519653
          ANDROID_API: "28"
          ANDROID_NDK_API: "28"
        run: |
          export ANDROID_HOME=${{ github.workspace }}/android-sdk
          export ANDROIDSDK=$ANDROID_HOME
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653
          export ANDROID_API=28
          export ANDROID_NDK_API=28
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          
          echo "=== Environment ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "ANDROID_API=$ANDROID_API"
          echo "PATH=$PATH"
          
          echo "=== SDK contents ==="
          ls $ANDROID_HOME/
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms"
          ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools"
          ls $ANDROID_HOME/ndk/ 2>/dev/null || echo "No NDK"
          
          echo "=== buildozer version ==="
          python3 -m buildozer --version 2>&1 || buildozer --version 2>&1 || echo "buildozer not found"
          
          echo "=== python-for-android version ==="
          python3 -m pythonforandroid 2>&1 || echo "p4a not found"
          
          echo "=== Running buildozer android debug ==="
          python3 -m buildozer android debug 2>&1 || {
            EXIT=$?
            echo "=== buildozer exit code: $EXIT ==="
            ls -la .buildozer/ 2>/dev/null || echo ".buildozer not found"
            cat .buildozer/*.log 2>/dev/null || echo "No logs"
            exit $EXIT
          }
          
          echo "=== Looking for APK ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          ls -la bin/ 2>/dev/null || echo "bin/ not found"
        timeout-minutes: 90

      - name: Upload APK
        if: success()
        run: |
          APK=$(find . -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found"
            exit 1
          fi
          cp "$APK" sme-strategy.apk
          TAG="v$(date +%Y%m%d-%H%M%S)"
          RESPONSE=$(curl -sL \
            -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/${{ github.repository }}/releases \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"SME策略 App $TAG\",\"draft\":false}")
          echo "Release: $RESPONSE"
          UPLOAD_URL=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('upload_url','').replace('{?name,label}',''))" 2>/dev/null)
          if [ -n "$UPLOAD_URL" ]; then
            curl -sL -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@sme-strategy.apk" \
              "$UPLOAD_URL?name=sme-strategy.apk"
          fi
