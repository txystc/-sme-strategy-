name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-dev git zip unzip openjdk-17-jdk

      - name: Install buildozer
        run: |
          pip3 install --user buildozer
          pip3 install --user cython==0.29.36
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$PATH:$HOME/.local/bin"
          which buildozer || echo "buildozer NOT found"
          buildozer version || echo "version failed"

      - name: Build with buildozer
        run: |
          export PATH="$PATH:$HOME/.local/bin"
          buildozer android debug || echo "BUILD FAILED"
          echo "=== APK check ==="
          find . -name "*.apk" -type f -exec ls -lh {} \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sme-strategy-apk
          path: bin/*.apk
          retention-days: 1
