name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            openjdk-17-jdk-headless \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libswscale-dev libffi-dev libssl-dev \
            cmake git zip unzip wget python3-pip \
            python3-dev python3-venv

      - name: Download Android SDK
        run: |
          mkdir -p android-sdk
          cd android-sdk
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          ls -la cmdline-tools/latest/bin/

      - name: Install Android SDK components
        run: |
          export ANDROID_HOME=$PWD/android-sdk
          export ANDROIDSDK=$ANDROID_HOME
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager \
            "platforms;android-28" \
            "build-tools;34.0.0" \
            "platform-tools" \
            "ndk;25.2.9519653"

      - name: Install buildozer + python-for-android
        run: |
          pip3 install --upgrade pip setuptools wheel
          pip3 install Cython==0.29.37
          pip3 install buildozer python-for-android
          python3 -m buildozer --version
          pip3 show python-for-android | head -5

      - name: Build debug APK
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
          ANDROIDSDK: ${{ github.workspace }}/android-sdk
          PATH: ${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:${{ github.workspace }}/android-sdk/platform-tools:${{ github.workspace }}/android-sdk/build-tools/34.0.0:/usr/local/bin:/usr/bin:/bin
        run: |
          set -x  # echo all commands
          echo "=== ANDROID_HOME ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROIDSDK=$ANDROIDSDK"
          echo "pwd=$(pwd)"
          echo "=== SDK contents ==="
          ls -la "$ANDROID_HOME/"
          echo "=== NDK ==="
          ls "$ANDROID_HOME/ndk/" 2>/dev/null || echo "(no NDK)"
          echo "=== build-tools ==="
          ls "$ANDROID_HOME/build-tools/" 2>/dev/null || echo "(no build-tools)"
          echo "=== platform-tools ==="
          ls "$ANDROID_HOME/platform-tools/" 2>/dev/null || echo "(no platform-tools)"
          echo "=== buildozer version ==="
          python3 -m buildozer --version 2>&1 || echo "buildozer check failed"
          echo "=== buildozer spec ==="
          cat buildozer.spec 2>/dev/null || cat spec/buildozer.spec 2>/dev/null || echo "(no spec found)"
          echo "=== ls project ==="
          ls -la
          echo "=== STARTING BUILD (capturing output) ==="
          # Capture buildozer output to file so we can see it in logs
          python3 -m buildozer android debug 2>&1 | tee buildozer_output.txt
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "=== buildozer EXIT CODE: $BUILD_EXIT ==="
          echo "=== workspace after build ==="
          ls -la
          echo "=== .buildozer dir ==="
          ls -la .buildozer/ 2>/dev/null || echo "(no .buildozer)"
          echo "=== bin dir ==="
          ls -la bin/ 2>/dev/null || echo "(no bin)"
          echo "=== find APK ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "no apk found"
          echo "=== buildozer_output.txt last 50 lines ==="
          tail -50 buildozer_output.txt 2>/dev/null || echo "(no output)"
          # Only fail if buildozer itself failed
          if [ "$BUILD_EXIT" != "0" ]; then
            echo "BUILD FAILED with exit $BUILD_EXIT"
            exit 1
          fi
          echo "BUILD SUCCESS"
        timeout-minutes: 90

      - name: Upload APK
        if: success()
        run: |
          echo "=== Search for APK ==="
          APK=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          echo "APK=$APK"
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found"
            exit 1
          fi
          echo "Found: $APK"
          cp "$APK" sme-strategy.apk
          TAG="v$(date +%Y%m%d-%H%M%S)"
          echo "=== Create release $TAG ==="
          RESP=$(curl -sL -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/${{ github.repository }}/releases \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"SME策略 $TAG\",\"draft\":false}")
          echo "Release response: $RESP"
          UPLOAD_URL=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('upload_url','').replace('{?name,label}',''))" 2>/dev/null)
          if [ -n "$UPLOAD_URL" ]; then
            curl -sL -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@sme-strategy.apk" \
              "$UPLOAD_URL?name=sme-strategy.apk"
            echo "Upload done"
          else
            echo "ERROR: No release URL"
            exit 1
          fi

      - name: Upload build log on failure
        if: failure()
        run: |
          echo "=== buildozer_output.txt ==="
          cat buildozer_output.txt 2>/dev/null | tail -100 || echo "(no file)"
