name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with buildozer Docker
        run: |
          set -e
          docker run --rm -v "$PWD:/app" -w /app ghcr.io/kivy/buildozer:latest buildozer android debug > buildozer_output.txt 2>&1 || true
          echo "=== Build Output ==="
          cat buildozer_output.txt
          echo "=== Check APK ==="
          find . -name "*.apk" || echo "No APK found"

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer_output.txt
          retention-days: 3

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sme-strategy-apk
          path: bin/*.apk
          retention-days: 1
