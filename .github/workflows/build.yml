name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            openjdk-17-jdk-headless \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libswscale-dev libffi-dev libssl-dev \
            cmake git zip unzip wget python3-pip \
            python3-dev python3-venv

      - name: Download Android SDK
        run: |
          mkdir -p android-sdk
          cd android-sdk
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          ls -la cmdline-tools/latest/bin/

      - name: Install Android SDK components
        run: |
          export ANDROID_HOME=$PWD/android-sdk
          export ANDROIDSDK=$ANDROID_HOME
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager \
            "platforms;android-28" \
            "build-tools;34.0.0" \
            "platform-tools" \
            "ndk;25.2.9519653"

      - name: Install buildozer and python-for-android
        run: |
          export HOME=/root
          pip3 install --upgrade pip setuptools wheel
          pip3 install buildozer python-for-android

      - name: Build debug APK
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
          ANDROIDSDK: ${{ github.workspace }}/android-sdk
          PATH: ${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:${{ github.workspace }}/android-sdk/platform-tools:${{ github.workspace }}/android-sdk/build-tools/34.0.0:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        run: |
          set -x
          echo "PWD=$(pwd)"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "java=$(which java)"
          java -version 2>&1
          echo "python=$(which python3)"
          python3 --version
          echo "buildozer=$(python3 -c 'import buildozer; print(buildozer.__version__)' 2>&1)"
          echo "p4a=$(python3 -c 'import pythonforandroid; print(pythonforandroid.__version__)' 2>&1)"
          echo "ndk=$(ls $ANDROID_HOME/ndk/ 2>/dev/null || echo none)"
          echo "bt=$(ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo none)"
          echo "spec_head=$(head -20 buildozer.spec 2>/dev/null || echo no_spec)"
          echo "=== BUILD START ==="
          python3 -m buildozer android debug 2>&1 || true
          echo "=== BUILD DONE ==="
