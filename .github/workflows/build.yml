name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with buildozer Docker
        run: |
          docker run --rm -v "$PWD:/app" -w /app ghcr.io/kivy/buildozer:latest buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sme-strategy-apk
          path: bin/*.apk
          retention-days: 1
